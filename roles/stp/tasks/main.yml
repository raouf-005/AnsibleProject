# ============================================================
# Role stp : Configuration STP classique sur les commutateurs
# ============================================================
# Active le Spanning Tree Protocol (STP 802.1D) pour éliminer
# les boucles L2 dans la topologie redondante triangle
---
- name: Vider les changements NCLU en attente
  command: net abort
  failed_when: false
  changed_when: false

- name: Configurer le bridge avec STP classique (Cumulus 4.3)
  command: "{{ item }}"
  loop:
    - "net add bridge bridge ports {{ bridge_ports }}"
    - net add bridge bridge stp on
    - net add bridge bridge mstpctl-forcevers stp
  failed_when: false
  changed_when: false

- name: Commit de la configuration STP
  command: net commit
  failed_when: false
  changed_when: false

- name: Vérifier l'état STP
  command: mstpctl showbridge bridge
  register: stp_bridge_status

- name: Afficher l'état du bridge STP
  debug:
    var: stp_bridge_status.stdout_lines

- name: Vérifier le rôle et état de chaque port
  command: mstpctl showport bridge {{ item }}
  loop: "{{ stp_ports | default(['swp1','swp2','swp3']) }}"
  register: stp_port_status
  ignore_errors: true

- name: Afficher le statut des ports STP
  debug:
    msg: "{{ item.stdout_lines }}"
  loop: "{{ stp_port_status.results }}"
  loop_control:
    label: "{{ item.item }}"
