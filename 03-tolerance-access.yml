---
- name: Configuration M1 et M2
  hosts: clients
  become: yes
  roles:
    - mlag-client

- name: 🚀 Configuration du cluster MLAG (Cumulus NCLU)
  hosts: switches
  become: yes
  serial: 1
  vars:
    mlag_sys_mac: "44:38:39:BE:EF:AA"

  tasks:
    - name: 🧹 Reset NCLU pending
      command: net abort

    # ==========================================
    # ⚙️ SWITCH 1 — Primary
    # ==========================================
    - name: Configurer Switch 1
      command: "{{ item }}"
      loop:
        - "net add bond bond-m1 bond slaves {{ sw1_machine1_port }}"
        - "net add bond bond-m1 clag id 1"
        - "net add bond bond-m2 bond slaves {{ sw1_machine2_port }}"
        - "net add bond bond-m2 clag id 2"
        - "net add bridge bridge ports bond-m1,bond-m2,{{ sw1_uplink_port }}"
        - "net add clag peer sys-mac 44:38:39:BE:EF:AA interface {{ sw1_peer_ports }} primary backup-ip 192.168.198.12"
      when: inventory_hostname == 'switch1'

    # ==========================================
    # ⚙️ SWITCH 2 — Secondary
    # ==========================================
    - name: Configurer Switch 2
      command: "{{ item }}"
      loop:
        - "net add bond bond-m1 bond slaves {{ sw2_machine1_port }}"
        - "net add bond bond-m1 clag id 1"
        - "net add bond bond-m2 bond slaves {{ sw2_machine2_port }}"
        - "net add bond bond-m2 clag id 2"
        - "net add bridge bridge ports bond-m1,bond-m2,{{ sw2_uplink_port }}"
        - "net add clag peer sys-mac 44:38:39:BE:EF:AA interface {{ sw2_peer_ports }} secondary backup-ip 192.168.198.11"
      when: inventory_hostname == 'switch2'

    # ==========================================
    # ⚙️ SWITCH 3 — Routeur L3
    # ==========================================
    - name: Déclarer les interfaces sur Switch 3
      command: "{{ item }}"
      loop:
        - "net add interface swp2"
        - "net add interface swp3"
      ignore_errors: yes
      when: inventory_hostname == 'switch3'

    - name: Configurer Switch 3
      command: "{{ item }}"
      loop:
        - "net add bridge bridge ports {{ sw3_switch1_port }},{{ sw3_switch2_port }}"
        - "net add bridge bridge pvid 1"
        - "net add vlan 1 ip address 192.168.1.254/24"
        - "net add vlan 1 ip address 192.168.2.254/24"
      when: inventory_hostname == 'switch3'

    - name: Commit de la configuration MLAG
      command: net commit
      when: inventory_hostname in ['switch1', 'switch2', 'switch3']

    # ==========================================
    # 🔍 VÉRIFICATION
    # ==========================================
    - name: Vérifier l'état CLAG
      command: net show clag
      register: clag_status
      changed_when: false
      when: inventory_hostname in ['switch1', 'switch2']

    - name: Afficher le statut MLAG
      debug:
        msg: "{{ clag_status.stdout_lines }}"
      when: inventory_hostname in ['switch1', 'switch2']

- name: Ping de test entre les machines et les serveurs NFS
  hosts: machine2
  become: yes
  tasks:
    - name: Ping de test
      command: ping -c 3 {{ hostvars["machine1"]['bond_ip'] }}
      register: ping_result
      changed_when: false
