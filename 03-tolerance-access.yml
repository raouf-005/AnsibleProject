---
- name: Configuration M1 et M2
  hosts: clients
  become: yes
  roles:
    - mlag-client

- name: 🚀 Configuration MLAG et Accès
  hosts: switches
  become: yes
  serial: 1
  vars:
    mlag_sys_mac: "44:38:39:BE:EF:AA"

  tasks:
    - name: 🧹 Reset NCLU pending
      command: net abort
      ignore_errors: yes

    # ==========================================
    # ⚙️ SWITCH 1 & 2 — MLAG + VLANs
    # ==========================================
    - name: Configurer Switch 1 et 2 (Leafs)
      command: "{{ item }}"
      loop:
        # Ports vers les machines en Access (VLAN 10 et 20)
        - "net add bond bond-m1 bond slaves {{ hostvars[inventory_hostname][inventory_hostname[0:3] + '_machine1_port'] }}"
        - "net add bond bond-m1 clag id 1"
        - "net add interface bond-m1 bridge access 10"
        - "net add bond bond-m2 bond slaves {{ hostvars[inventory_hostname][inventory_hostname[0:3] + '_machine2_port'] }}"
        - "net add bond bond-m2 clag id 2"
        - "net add interface bond-m2 bridge access 20"

        # Activer le bridge VLAN-aware et les Trunks vers Switch 3 (et futur 3b)
        - "net add bridge bridge vlan-aware"
        - "net add bridge bridge ports bond-m1,bond-m2,{{ hostvars[inventory_hostname][inventory_hostname[0:3] + '_uplink_port'] }}"
        - "net add interface {{ hostvars[inventory_hostname][inventory_hostname[0:3] + '_uplink_port'] }} bridge trunk vlans 10,20"

        # Peerlink MLAG
        - "net add clag peer sys-mac {{ mlag_sys_mac }} interface {{ hostvars[inventory_hostname][inventory_hostname[0:3] + '_peer_ports'] }} {{ 'primary backup-ip 192.168.198.12' if inventory_hostname == 'switch1' else 'secondary backup-ip 192.168.198.11' }}"
      when: inventory_hostname in ['switch1', 'switch2']

    # ==========================================
    # ⚙️ SWITCH 3 — Un seul Routeur L3
    # ==========================================
    - name: Configurer Switch 3 (Gateway unique)
      command: "{{ item }}"
      loop:
        - "net add bridge bridge vlan-aware"
        - "net add bridge bridge ports {{ hostvars['switch3']['sw3_switch1_port'] }},{{ hostvars['switch3']['sw3_switch2_port'] }}"
        - "net add interface {{ hostvars['switch3']['sw3_switch1_port'] }} bridge trunk vlans 10,20"
        - "net add interface {{ hostvars['switch3']['sw3_switch2_port'] }} bridge trunk vlans 10,20"
        # Adresses IP .254 directement sur les VLANs
        - "net add vlan 10 ip address 192.168.1.254/24"
        - "net add vlan 20 ip address 192.168.2.254/24"
      when: inventory_hostname == 'switch3'

    - name: Commit de la configuration
      command: net commit
      when: inventory_hostname in ['switch1', 'switch2', 'switch3']

    # ==========================================
    # 🔍 VÉRIFICATION
    # ==========================================
    - name: Vérifier l'état CLAG
      command: net show clag
      register: clag_status
      changed_when: false
      when: inventory_hostname in ['switch1', 'switch2']

    - name: Afficher le statut MLAG
      debug:
        msg: "{{ clag_status.stdout_lines }}"
      when: inventory_hostname in ['switch1', 'switch2']

- name: Ping de test entre les machines
  hosts: machine2
  become: yes
  tasks:
    - name: Ping de test vers la passerelle
      command: ping -c 3 192.168.2.254
      register: ping_result
      changed_when: false
