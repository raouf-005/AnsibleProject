---
- name: Restore baseline configuration on Cumulus switches
  hosts: switches
  become: yes

  vars:
    backup_files:
      switch1: "config_backup-2026-03-18-20.08.12_cumulus-perm"
      switch2: "config_backup-2026-03-18-20.18.36_cumulus-perm"
      switch3: "config_backup-2026-03-18-20.08.12_cumulus-perm"
      switch3b: "config_backup-2026-03-27-18.58.21_cumulus-perm"
  tasks:
    - name: Restore the permanent backup for this switch
      command: "config-restore -f -b {{ backup_files[inventory_hostname] }}"
      register: restore_result

    - name: net abort pour annuler les changements en attente
      command: net abort
      ignore_errors: yes
    - name: Show restore result
      debug:
        msg: "{{ restore_result.stdout_lines | default([]) }}"

    - name: Reload network interfaces after restore
      command: ifreload -a

    - name: Restart FRR to apply restored routing/MLAG
      service:
        name: frr
        state: restarted
    - name: Uncomment ifupdownblacklist line in netd.conf
      replace:
        path: /etc/netd.conf
        regexp: "^# (ifupdownblacklist.*)"
        replace: '\1'

    - name: Restart netd service
      systemd:
        name: netd
        state: restarted

- name: Delete NFS exports and client configs
  hosts: all
  become: yes

  tasks:
    - name: Remove NFS exports file
      file:
        path: /etc/exports
        state: absent

- name: Find all files in interfaces.d
  hosts: clients,servers
  become: yes
  tasks:
    - name: Find all files in /etc/network/interfaces.d
      find:
        paths: /etc/network/interfaces.d
        file_type: file
      register: iface_files

    - name: Remove all files in /etc/network/interfaces.d
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ iface_files.files }}"

- name: Restart networking to apply clean state
  hosts: machines,servers
  become: yes
  tasks:
    - name: Restart networking service
      systemd:
        name: networking
        state: restarted

- name: Disable NFS mounts
  hosts: clients
  become: yes
  tasks:
    - name: Comment out NFS entries in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\snfs\s.*)'
        replace: '# \1'

    - name: Unmount all NFS mounts
      command: umount -f -l -t nfs -a
      ignore_errors: yes

    - name: Disable rpcbind
      systemd:
        name: rpcbind
        state: stopped
        enabled: no

- name: Activate ports Switches
  hosts: switches
  become: yes

  tasks:
    - name: ifreload to apply the port activation
      command: ifreload -a

    - name: restart systemd to apply changes
      systemd:
        name: systemd-networkd
        state: restarted

- name: Ensure hostname on Cumulus switches
  hosts: switches,T4
  become: yes
  gather_facts: no
  tasks:
    - name: Set hostname to inventory hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"
