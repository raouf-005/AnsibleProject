# ============================================================
# PLAYBOOK PARTIE 1 : NFS avec VLAN et bonding directement
# ============================================================
# Configuration finale appliquée directement en une seule passe :
#   1. Base commune sur tous les hôtes
#   2. Installation des paquets
#   3. VLANs sur les switches
#   4. Isolation VLAN (pas de routage inter-VLAN sur switch3)
#   5. Bond LACP sur le serveur NFS vers switch1 (bond0.10 + bond0.20)
#   6. Exports NFS
#   7. Interfaces clientes en lien simple
#   8. Montage NFS via les IPs VLAN
#
# Exécution :
#   ANSIBLE_CONFIG=./ansible.cfg ansible-playbook -i inventories/hosts.ini 01-nfs-partage.yml
# ============================================================
---
#- name: "[Partie 1] Configuration de base"
# hosts: all
# become: yes
# roles:
#   - common

- name: "[Partie 1] Installer les paquets"
  hosts: serveur-nfs:clients
  become: yes
  tasks:
    - name: Installer ifenslave, vlan et paquets NFS sur le serveur
      apt:
        name:
          - ifenslave
          - vlan
          - nfs-kernel-server
          - nfs-common
        state: present
      when: inventory_hostname == "serveur-nfs"

    - name: Installer le client NFS sur les machines
      apt:
        name:
          - nfs-common
        state: present
      when: inventory_hostname in groups['clients']

- name: "[Partie 1] Configurer les VLANs sur les switches"
  hosts: switches
  become: yes
  roles:
    - vlans

- name: "[Partie 1] Desactiver le routage inter-VLAN sur switch3"
  hosts: switch_l3
  become: yes
  tasks:
    - name: Purger les commandes NCLU en attente
      command: net abort
      failed_when: false
      changed_when: false

    - name: Supprimer les passerelles VLAN si presentes
      command: "{{ item }}"
      loop:
        - net del vlan {{ vlan_machine1 }} ip address {{ gw_vlan10 }}/24
        - net del vlan {{ vlan_machine2 }} ip address {{ gw_vlan20 }}/24
      failed_when: false
      changed_when: false

    - name: Commit NCLU de l'isolation VLAN
      command: net commit
      failed_when: false
      changed_when: false

    - name: Desactiver le routage IPv4
      sysctl:
        name: net.ipv4.ip_forward
        value: "0"
        sysctl_set: yes
        state: present
        reload: yes

- name: "[Partie 1] Bond LACP sur le serveur NFS"
  hosts: servers
  become: yes
  roles:
    - bonding-server
  handlers:
    - name: restart networking
      systemd:
        name: networking
        state: restarted

- name: "[Partie 1] Configurer les exports NFS"
  hosts: servers
  become: yes
  roles:
    - nfs-server
  handlers:
    - name: restart nfs
      systemd:
        name: nfs-kernel-server
        state: restarted

- name: "[Partie 1] Configurer les interfaces clientes"
  hosts: machine1
  become: yes
  tasks:
    - name: Configurer l'interface client-lan
      copy:
        dest: /etc/network/interfaces.d/client-lan
        owner: root
        group: root
        mode: "0644"
        content: |
          auto {{ lab_client_interface }}
          iface {{ lab_client_interface }} inet static
              address {{ ip_machine1  }}
              netmask 255.255.255.0
    - name: Appliquer la configuration réseau
      systemd:
        name: networking
        state: restarted
- name: "[Partie 1] Configurer les interfaces machine 2"
  hosts: machine2
  become: yes
  tasks:
    - name: Configurer l'interface client-lan
      copy:
        dest: /etc/network/interfaces.d/client-lan
        owner: root
        group: root
        mode: "0644"
        content: |
          auto {{ lab_client_interface }}
          iface {{ lab_client_interface }} inet static
              address {{ ip_machine2 }}
              netmask 255.255.255.0

    - name: Appliquer la configuration réseau
      systemd:
        name: networking
        state: restarted

- name: "[Partie 1] Monter NFS via les IPs VLAN"
  hosts: clients
  become: yes
  vars:
    nfs_mount_server: "{{ nfs_server_ip_map[inventory_hostname] }}"
  roles:
    - nfs-client
