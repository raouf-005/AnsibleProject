# ============================================================
# Role rstp : Configuration RSTP (Rapid STP) sur les commutateurs
# ============================================================
# Active RSTP (802.1w) pour une convergence plus rapide
# que le STP classique en cas de changement de topologie
---
- name: Vider les changements NCLU en attente
  command: net abort
  failed_when: false
  changed_when: false

- name: Configurer le bridge avec RSTP
  command: "{{ item }}"
  loop:
    - "net add bridge bridge ports {{ bridge_ports | default('swp1,swp2,swp3') }}"
    - net add bridge bridge stp on
    - net add bridge bridge mstpctl-forcevers rstp
  failed_when: false
  changed_when: false

- name: Commit de la configuration RSTP
  command: net commit
  failed_when: false
  changed_when: false

- name: Vérifier l'état RSTP
  command: mstpctl showbridge bridge
  register: rstp_bridge_status

- name: Afficher l'état du bridge RSTP
  debug:
    var: rstp_bridge_status.stdout_lines

- name: Vérifier le rôle et état de chaque port (RSTP)
  command: mstpctl showport bridge {{ item }}
  loop: "{{ stp_ports | default(['swp1','swp2','swp3']) }}"
  register: rstp_port_status
  ignore_errors: true

- name: Afficher le statut des ports RSTP
  debug:
    msg: "{{ item.stdout_lines }}"
  loop: "{{ rstp_port_status.results }}"
  loop_control:
    label: "{{ item.item }}"
