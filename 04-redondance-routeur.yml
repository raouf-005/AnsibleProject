    - name: Configuration VRR sur SVI via NCLU
      ansible.builtin.command: "{{ item }}"
      loop:
        # 1. Trunks L2
        - "net add bridge bridge vlan-aware"
        - "net add bridge bridge ports swp2,swp3"
        - "net add interface swp2 bridge trunk vlans 10,20"
        - "net add interface swp3 bridge trunk vlans 10,20"

        # 2. VLAN 10 : IP physique (.4) + IP Virtuelle VRR (.254)
        - "net add vlan 10 ip address 192.168.1.4/24"
        - "net add vlan 10 ip address-virtual 00:00:5E:00:01:01 192.168.1.254/24"

        # 3. VLAN 20 : IP physique (.4) + IP Virtuelle VRR (.254)
        - "net add vlan 20 ip address 192.168.2.4/24"
        - "net add vlan 20 ip address-virtual 00:00:5E:00:01:02 192.168.2.254/24"
        - "net commit"
