- name: Configure Leaf 1 switch
  hosts: switch1
  become: yes

  tasks:
    - name: Create VLAN aware bridge
      command: "{{ item }}"
      loop:
        - "net add bridge bridge ports {{ sw1_uplink_portRedundance }}"
        - net add interface {{ sw1_uplink_portRedundance }} bridge trunk vlans 10,20 ## juste pour confirmer
        - net commit

