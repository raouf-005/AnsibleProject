############################################
# LEAF SWITCH 1
############################################

- name: Configure Leaf 1
  hosts: switch1
  become: yes

  tasks:
    - name: Cancel pending config
      command: net abort
      ignore_errors: yes

    - name: Configure bridge
      command: "{{ item }}"
      loop:
        - net add bridge bridge vlan-aware
        - net add bridge bridge ports {{ sw1_uplink_portRedundance }}
        - net add interface {{ sw1_uplink_portRedundance }} bridge trunk vlans 10,20

    - name: Commit configuration
      command: net commit

