---
############################################
# VRRP MASTER
############################################

- name: Configure VRRP MASTER
  hosts: switch3
  become: yes

  tasks:
    - name: Cancel pending config
      command: net abort
      ignore_errors: yes

    - name: Restore configuration from backup
      command: "config-restore -f -b config_backup-2026-03-18-20.08.12_cumulus-perm"
      register: restore_result

    - name: Show restore result
      debug:
        msg: "{{ restore_result.stdout_lines | default([]) }}"

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present

    - name: Restart FRR
      systemd:
        name: frr
        state: restarted

    - name: Configure bridge and VLANs
      command: "{{ item }}"
      loop:
        - net add bridge bridge vlan-aware
        - net add bridge bridge ports swp2,swp3
        - net add interface swp2 bridge trunk vlans 10,20
        - net add interface swp3 bridge trunk vlans 10,20
        - net add vlan 10
        - net add vlan 20
        - net add vlan 10 ip address 192.168.1.3/24
        - net add vlan 20 ip address 192.168.2.3/24

    - name: Configure VRRP MASTER
      command: "{{ item }}"
      loop:
        - net add vlan 10 vrrp 10 192.168.1.254/24
        - net add vlan 10 vrrp 10 advertisement-interval 1000
        - net add vlan 20 vrrp 20 192.168.2.254/24
        - net add vlan 20 vrrp 20 advertisement-interval 1000

    - name: Commit configuration
      command: net commit

############################################
# VRRP BACKUP
############################################

- name: Configure VRRP BACKUP
  hosts: switch3b
  become: yes

  tasks:
    - name: Cancel pending config
