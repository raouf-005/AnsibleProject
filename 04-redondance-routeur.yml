---
- name: Configure VRRP MASTER
  hosts: switch3
  become: yes

  tasks:
    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present

    - name: Enable VRRP daemon
      lineinfile:
        path: /etc/frr/daemons
        regexp: "^vrrpd="
        line: "vrrpd=yes"

    - name: Restart FRR
      systemd:
        name: frr
        state: restarted

    - name: Configure bridge and VLANs
      command: "{{ item }}"
      loop:
        - net add bridge bridge vlan-aware
        - net add bridge bridge ports swp2,swp3
        - net add interface swp2 bridge trunk vlans 10,20
        - net add interface swp3 bridge trunk vlans 10,20
        - net add vlan 10 ip address 192.168.1.3/24
        - net add vlan 20 ip address 192.168.2.3/24
        - net commit

    - name: Configure VRRP
      shell: |
        vtysh << EOF
        configure terminal
        interface vlan10
        vrrp 10 ip 192.168.1.254
        vrrp 10 priority 150
        vrrp 10 preempt
        exit
        interface vlan20
        vrrp 20 ip 192.168.2.254
        vrrp 20 priority 150
        vrrp 20 preempt
        exit
        end
        write memory
        EOF
