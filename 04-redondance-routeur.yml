---
- name: Configuration VRRP - Routeur principal
  hosts: switch3
  become: yes
  tasks:
    - name: Restore the permanent backup for this switch
      command: "config-restore -f -b config_backup-2026-03-18-20.08.12_cumulus-perm"

    - name: net abort pour annuler les changements en attente
      command: net abort
      ignore_errors: yes

    - name: Activer IP forwarding
      ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1

    - name: Configuration VRRP sur Switch3 (Master)
      ansible.builtin.command: "{{ item }}"
      loop:
        - net add interface swp2 ip address 192.168.1.3/24
        - net add interface swp2 vrrp  10  192.168.1.254/24
        - net add interface swp2 vrrp  10 priority 150
        - net add interface swp2 vrrp  10 advertisement-interval 5000
        - net add interface swp3 ip address 192.168.2.3/24
        - net add interface swp3 vrrp  20  192.168.2.254/24
        - net add interface swp3 vrrp  20 priority 150
        - net add interface swp3 vrrp  20 advertisement-interval 5000
        - net commit

- name: Configuration VRRP - Routeur secondaire
  hosts: switch3b
  become: yes
  tasks:
    - name: Restore the backup with VRRP config for switch3b
      command: config-restore -f -b  config_backup-2026-03-25-17.40.57_cumulus-perm

    - name: Activer IP forwarding
      ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1

    - name: Configuration VRRP sur Switch4 (Backup)
      ansible.builtin.command: "{{ item }}"
      loop:
        - net add interface swp2 ip address 192.168.1.4/24
        - net add interface swp2 vrrp  10  192.168.1.254/24
        - net add interface swp2 vrrp  10 priority 100
        - net add interface swp2 vrrp  10 advertisement-interval 5000
        - net add interface swp3 ip address 192.168.2.4/24
        - net add interface swp3 vrrp  20  192.168.2.254/24
        - net add interface swp3 vrrp  20 priority 100
        - net add interface swp3 vrrp  20 advertisement-interval 5000
        - net commit
