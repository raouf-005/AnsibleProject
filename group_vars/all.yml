# Variables globales
nfs_version: 3
domain: projet.local
net_management: "192.168.198.0/24"
nfs_export_options: "rw,sync,no_subtree_check,no_root_squash"

# Cumulus / NCLU
# Description utilisee pour tracer les commits executes par Ansible
nclu_commit_description_prefix: "Ansible"
nclu_cleanup_commit_description: "full reset baseline before any playbook"
nclu_use_rollback_cleanup: true
nclu_cleanup_rollback_steps: 3

# VLANs
vlan_machine1: 10
vlan_machine2: 20

# Réseaux
net_vlan10: "192.168.10.0/24"
net_vlan20: "192.168.20.0/24"

# IPs
ip_machine1: "192.168.10.2"
ip_machine2: "192.168.20.4"
ip_serveur_vlan10: "192.168.10.10"
ip_serveur_vlan20: "192.168.20.10"

# IP NFS à utiliser par client selon la phase VLAN/bonding
nfs_server_ip_map:
  machine1: "192.168.10.10"
  machine2: "192.168.20.10"

# Points de montage NFS par client
nfs_client_mounts:
  machine1: "/machine1"
  machine2: "/machine2"

# Interface de labo utilisée pour la partie 1 (Single attachment)
lab_client_interface: "ens34"

# Bonding LACP Côté Client (ensX) - UNCHANGED
bond_name: "bond0"
bond_iface1: "ens34"
bond_iface2: "ens35"

# --- CABLAGE / TOPOLOGIE PHYSIQUE (Mis à jour selon le tableau) ---

# Switch 3 (Gateway / Distribution Layer)
# sw3 per-switch ports moved to host_vars/switch3.yml
# Miscellaneous/BGP (moved to host_vars/switch3.yml)
# Switch 1 (MLAG PEER 1/A)
# sw1 per-switch ports moved to host_vars/switch1.yml
# Switch 2 (MLAG PEER 2/B)
# sw2 per-switch ports moved to host_vars/switch2.yml

# ------------------------------------------------------------------

# Passerelles VLAN (VIP VRR / switch3)
gw_vlan10: "192.168.10.1"
gw_vlan20: "192.168.20.1"

stp_client_ips:
  machine1: "192.168.10.2"
  machine2: "192.168.10.3"
